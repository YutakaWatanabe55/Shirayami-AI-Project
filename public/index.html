<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STT リアルタイムひらがなデモ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>リアルタイム STT + ひらがな3方式同時変換</h1>
      <p class="note">先にリアルタイム文字起こしを行い、その結果に続いて 2.1 / 2.2 / 3.1 を同時実行して比較表示します。</p>

      <section class="panel">
        <div class="grid2">
          <label>
            チャンク間隔 (ms)
            <select id="chunkMs">
              <option value="1000">1000</option>
              <option value="1500" selected>1500</option>
              <option value="2000">2000</option>
              <option value="3000">3000</option>
            </select>
          </label>

          <label>
            2.2用ヒント文（任意）
            <input id="hintText" type="text" placeholder="例: 洗濯機の使い方について話しています" />
          </label>
        </div>

        <div class="actions">
          <button id="startBtn" type="button">録音開始</button>
          <button id="stopBtn" type="button" disabled>録音停止</button>
        </div>
      </section>

      <section class="panel">
        <h2>リアルタイム文字起こし</h2>
        <pre id="realtimeTranscript">(未開始)</pre>
      </section>

      <section class="panel">
        <h2>ひらがな変換（同時実行）</h2>
        <p><strong>2.1 Whisper suppress_tokens</strong></p>
        <pre id="h21">(未開始)</pre>

        <p><strong>2.2 ヒント付き再推論 + cutlet</strong></p>
        <pre id="h22">(未開始)</pre>

        <p><strong>3.1 後処理 cutlet</strong></p>
        <pre id="h31">(未開始)</pre>
      </section>

      <section class="panel">
        <h2>処理時間比較</h2>
        <pre id="timing">-</pre>
        <p><strong>状態</strong></p>
        <pre id="status">-</pre>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
